<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 430px;
        font-family: Arial, sans-serif;
        padding: 14px;
        background: #f6f7fb;
        color: #111827;
      }

      h3 {
        margin: 0 0 12px;
        font-size: 18px;
      }

      button {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: none;
        background: #2563eb;
        color: white;
        font-weight: bold;
        cursor: pointer;
        font-size: 14px;
      }

      button:hover {
        background: #1d4ed8;
      }

      .box {
        background: white;
        border-radius: 12px;
        padding: 12px;
        margin-top: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      }

      .section-title {
        font-weight: bold;
        color: #2563eb;
        margin-bottom: 6px;
        font-size: 14px;
      }

      .content {
        font-size: 13px;
        line-height: 1.55;
        white-space: pre-wrap;
      }

      .suggestion {
        background: #f0f7ff;
        border-left: 4px solid #2563eb;
        padding: 10px;
        border-radius: 8px;
        margin-top: 8px;
      }

      .loading {
        color: #6b7280;
        font-size: 13px;
      }
    </style>
  </head>

  <body>
    <h3>Sworld Sense</h3>

    <button id="btn">Phân tích hội thoại</button>

    <div id="result" class="box">
      <div class="loading">Chưa có dữ liệu.</div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
